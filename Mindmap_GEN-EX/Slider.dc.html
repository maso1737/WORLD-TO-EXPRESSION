<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @dsCard group="Components" viewport="420x560" name="Slider" subtitle="Range slider row with label + value readout" -->
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    @font-face{font-family:"Bank Gothic";src:url("fonts/bank-gothic-light-bt.ttf") format("truetype");font-weight:300 600;font-display:swap}
    :root{
      --bg:#f2f2ef;--ink:#0a0a0a;--mute:#999;--mute-2:#c8c8c4;--line:#0a0a0a;
      --acc:{{ accentColor }};--acc-ink:{{ accentInk }};
      --panel-bg:#ffffff;--ez:cubic-bezier(0.2,0,0,1);
      --mono:"JetBrains Mono",ui-monospace,monospace;
    }
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--mute-2);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--panel-bg);border:1.5px solid var(--ink);cursor:pointer;transition:background 100ms}
    input[type=range]:hover::-webkit-slider-thumb{background:var(--acc)}
    input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:0;background:var(--panel-bg);border:1.5px solid var(--ink);cursor:pointer}
  </style>
</helmet>

<div style="background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:48px;padding:48px">

  <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.22em;color:var(--mute);text-transform:uppercase;border-bottom:1px solid var(--mute-2);padding-bottom:8px;width:100%">
    MindMaps_9bcdb2 · Slider Component
  </div>

  <!-- Panel shell (tw__body) -->
  <div style="background:var(--panel-bg);border:1px solid var(--line);width:240px;font-family:var(--mono)">

    <!-- Panel header (tw__hd) -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--ink);color:var(--bg);letter-spacing:0.12em;text-transform:uppercase;font-size:10px;font-weight:600">
      TWEAKS
      <button style="background:none;border:none;color:var(--bg);cursor:pointer;font-size:12px">✕</button>
    </div>

    <!-- Panel body (tw__body) -->
    <div style="padding:12px;display:flex;flex-direction:column;gap:14px">

      <!-- Slider row 1 -->
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:0.08em;color:var(--mute);text-transform:uppercase">
          <span>Depth</span>
          <span style="color:var(--ink)">{{ v1 }}</span>
        </div>
        <input type="range" min="0" max="100" value="{{ v1 }}" onInput="{{ onV1 }}">
      </div>

      <!-- Slider row 2 -->
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:0.08em;color:var(--mute);text-transform:uppercase">
          <span>Zoom</span>
          <span style="color:var(--ink)">{{ v2 }}%</span>
        </div>
        <input type="range" min="20" max="200" value="{{ v2 }}" onInput="{{ onV2 }}">
      </div>

      <!-- Slider row 3 — acc highlighted value -->
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:0.08em;color:var(--mute);text-transform:uppercase">
          <span>Opacity</span>
          <span style="background:var(--acc);color:var(--acc-ink);padding:0 4px;font-family:var(--mono)">{{ v3 }}%</span>
        </div>
        <input type="range" min="0" max="100" value="{{ v3 }}" onInput="{{ onV3 }}">
      </div>

    </div>
  </div>

  <!-- Accent switcher -->
  <div style="display:flex;flex-direction:column;gap:8px">
    <span style="font-family:var(--mono);font-size:8px;letter-spacing:0.18em;color:var(--mute);text-transform:uppercase">ACCENT PREVIEW</span>
    <div style="display:flex;gap:8px">
      <button onClick="{{ setAccent }}" data-acc="lime"   style="width:26px;height:26px;background:#c8ff1a;border:2px solid var(--line);cursor:pointer"></button>
      <button onClick="{{ setAccent }}" data-acc="yellow" style="width:26px;height:26px;background:#ffd400;border:2px solid var(--line);cursor:pointer"></button>
      <button onClick="{{ setAccent }}" data-acc="pink"   style="width:26px;height:26px;background:#ff4da6;border:2px solid var(--line);cursor:pointer"></button>
      <button onClick="{{ setAccent }}" data-acc="orange" style="width:26px;height:26px;background:#ff7300;border:2px solid var(--line);cursor:pointer"></button>
      <button onClick="{{ setAccent }}" data-acc="ink"    style="width:26px;height:26px;background:#0a0a0a;border:2px solid var(--line);cursor:pointer"></button>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 420, &quot;height&quot;: 560 }
}">
const ACCENTS = { lime:'#c8ff1a', yellow:'#ffd400', pink:'#ff4da6', orange:'#ff7300', ink:'#0a0a0a' };
class Component extends DCLogic {
  state = { accent:'yellow', v1:42, v2:100, v3:80 };
  renderVals() {
    const acc   = this.state.accent;
    const color = ACCENTS[acc] || ACCENTS.yellow;
    const ink   = acc === 'ink' ? '#ffffff' : '#0a0a0a';
    return {
      accentColor: color, accentInk: ink,
      v1: this.state.v1, v2: this.state.v2, v3: this.state.v3,
      onV1: e => this.setState({ v1: +e.target.value }),
      onV2: e => this.setState({ v2: +e.target.value }),
      onV3: e => this.setState({ v3: +e.target.value }),
      setAccent: e => this.setState({ accent: e.currentTarget.dataset.acc }),
    };
  }
}
</script>
</body>
</html>
