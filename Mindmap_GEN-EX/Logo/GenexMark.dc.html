<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @dsCard group="Brand" viewport="240x240" name="GenexMark" subtitle="Animated G mark — color + eye props" -->
<svg viewBox="0 0 120 120" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block; overflow:visible">
  <g transform="rotate(-9 60 60)">
    <path d="M 94.67 32.91 A 44 44 0 1 0 94.67 87.09" stroke="{{ color }}" stroke-width="12.5" stroke-linecap="round" fill="none"></path>
    <path d="M 94.67 87.09 L 75 78.5" stroke="{{ color }}" stroke-width="12.5" stroke-linecap="round" fill="none"></path>
    <rect x="54" y="41" width="11.5" height="28" rx="5.75" fill="{{ color }}"></rect>
    <circle cx="42" cy="72" r="8" fill="{{ eye }}"></circle>
  </g>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:240,&quot;height&quot;:240},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0a0a0a&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eye&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const color = this.props.color ?? '#0a0a0a';
    return {
      color,
      eye: this.props.eye ?? color
    };
  }
}
</script>
</body>
</html>
